<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Interstellar Crash - Mobile Fixed</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Teko:wght@300;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="nebula.css">
</head>

<body>

    <div id="game-container">
        <canvas id="spaceCanvas"></canvas>

        <div class="ui-layer">
            <div class="top-hud">
                <div class="history-strip" id="historyStrip"></div>
                <div class="player-info">
                    <span class="player-name">PLAYER: <span id="playerName">JUGADOR</span></span>
                    <span class="player-balance">SALDO: <span id="playerBalance">Bs 1,000.00</span></span>
                </div>
            </div>

            <div class="center-stage">
                <div class="multiplier-readout" id="multDisplay">1.00x</div>
                <div class="game-status" id="statusDisplay">Sistemas Listos</div>
            </div>

            <div class="control-deck">
                <div class="input-module">
                    <div class="input-label">
                        <span>Apuesta</span>
                        <span class="balance-txt" id="balanceDisplay">Bs 1,000.00</span>
                    </div>
                    <div class="input-wrapper">
                        <!-- Botones de modificación de apuesta -->
                        <button class="stepper-btn" onclick="game.modBet(0.5)">½</button>
                        <button class="stepper-btn" onclick="game.modBet(-10)">-</button>
                        <!-- Campo de entrada con la CORRECCIÓN (llama a game.handleBetInput) -->
                        <input type="number" id="betInput" value="2.00" min="1.00" step="0.01"
                            oninput="game.handleBetInput(event)">
                        <button class="stepper-btn" onclick="game.modBet(10)">+</button>
                        <button class="stepper-btn" onclick="game.modBet(2)">2x</button>
                    </div>
                </div>

                <button class="launch-btn btn-bet" id="mainBtn">
                    <span class="btn-title">APOSTAR</span>
                    <span class="btn-sub">Próxima Ronda</span>
                </button>
            </div>
        </div>
    </div>

    <img id="shipImage" src="public/img/nave2.png" style="display:none;">
    <script src="nebula.js"></script>
</body>

</html>
